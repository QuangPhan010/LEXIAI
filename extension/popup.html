<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiAI Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="icons/icon48.png" alt="LexiAI">
                <span>LexiAI Analyzer</span>
            </div>
            <button id="settings-btn" title="Settings">⚙️</button>
        </header>

        <main id="main-view">
            <div id="sync-container" class="glass-card">
                <p>Sync your data from the LexiAI Web App to start analyzing.</p>
                <button id="sync-btn" class="primary-btn">Sync Data</button>
            </div>

            <div id="analysis-container" style="display: none;">
                <div class="score-card">
                    <div class="score-circle">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path id="score-path" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage" id="score-text">0%</text>
                        </svg>
                    </div>
                    <p>Match Score</p>
                </div>

                <div class="details">
                    <h3>Missing Skills</h3>
                    <ul id="missing-skills"></ul>
                </div>

                <div class="actions">
                    <button id="roadmap-btn" class="secondary-btn">View Roadmap</button>
                </div>
            </div>

            <div id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing with Gemini AI...</p>
            </div>
        </main>

        <div id="settings-view" style="display: none;">
            <h3>Settings</h3>
            <div class="input-group">
                <label>Gemini API Key</label>
                <input type="password" id="api-key-input" placeholder="Paste your API key here">
            </div>
            <div class="input-group">
                <label>CV Text (Extracted)</label>
                <textarea id="cv-text-input" placeholder="Paste your CV text here or Sync from Web App"></textarea>
            </div>
            <div class="settings-actions">
                <button id="save-settings-btn" class="primary-btn">Save Settings</button>
                <button id="back-btn" class="text-btn">Back</button>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
