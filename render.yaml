services:
  # A Docker service for the Django backend
  - type: web
    name: lexiai-backend
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn lexiai.wsgi:application"
    rootDir: lexiai
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: lexiai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "lexiai-backend.onrender.com" # Replace with your actual domain later
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app" # Replace with your actual frontend domain

databases:
  - name: lexiai-db
    plan: free
